    <h1> Quiz </h1>

    <form>
        <legend> Connaissez-vous vraiment les capybaras ? </legend>
            <input type="text"
            <ol>
                <li> Les capybaras sont :
                    <br>
                    <input type="radio" id="radio1" name="radio">
                    <label for="radio1"> herbivore </label>
                    <br><input type="radio" id="radio2" name="radio">
                    <label for="radio2"> carnivore </label>
                    <br><input type="radio" id="radio3" name="radio">
                    <label for="radio3"> frugivore </label>
                </li>
                <br>
                <li> Où vivent les capybaras ?
                    <br>
                    <input type="checkbox" id="checkbox1">
                    <label for="checkbox1"> marécage </label><br>
                    <input type="checkbox" id="checkbox2">
                    <label for="checkbox2"> désert </label><br>
                    <input type="checkbox" id="checkbox3">
                    <label for="checkbox3"> prairie </label>
                </li>
                <br>
                <li> Quel est le nom latin du capybara ?
                <input id="texte" type="text" name="exemple">
                </li>
            </ol>
            <input id="soumettre" class="quiz" type="button" value="Envoyer">
    </form>
